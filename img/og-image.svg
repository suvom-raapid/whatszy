<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#25d366"/>
      <stop offset="100%" stop-color="#00a884"/>
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0e1512"/>
      <stop offset="100%" stop-color="#0a0f0d"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Subtle grid -->
  <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
    <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#1e2e25" stroke-width="0.5"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)" opacity="0.3"/>

  <!-- Top accent bar -->
  <rect y="0" width="1200" height="4" fill="url(#accent)"/>

  <!-- Glow effect -->
  <ellipse cx="600" cy="200" rx="500" ry="250" fill="#25d366" opacity="0.04"/>

  <!-- WhatsApp icon -->
  <g transform="translate(520, 120) scale(2.5)" fill="#25d366">
    <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/>
    <path d="M12 0C5.373 0 0 5.373 0 12c0 2.625.846 5.059 2.284 7.034L.789 23.492a.5.5 0 00.627.616l4.584-1.393A11.943 11.943 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 22a9.94 9.94 0 01-5.39-1.583l-.376-.234-2.726.828.751-2.823-.248-.39A9.96 9.96 0 012 12C2 6.477 6.477 2 12 2s10 4.477 10 10-4.477 10-10 10z"/>
  </g>

  <!-- Site name -->
  <text x="600" y="260" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="64" font-weight="700" fill="#e9edef" letter-spacing="-1">WhatsFormat</text>

  <!-- Tagline -->
  <text x="600" y="310" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="28" fill="#25d366" letter-spacing="4" font-weight="500">WhatsApp Text Toolkit</text>

  <!-- Divider -->
  <line x1="400" y1="345" x2="800" y2="345" stroke="#1e2e25" stroke-width="1"/>

  <!-- Feature highlights -->
  <g font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#8696a0" text-anchor="middle">
    <text x="250" y="400">Formatter</text>
    <text x="400" y="400">Fancy Text</text>
    <text x="550" y="400">Emoji Picker</text>
    <text x="700" y="400">Text Repeater</text>
    <text x="880" y="400">Reverse &amp; Flip</text>
  </g>

  <!-- Feature dots -->
  <g fill="#25d366">
    <circle cx="250" cy="420" r="3"/>
    <circle cx="400" cy="420" r="3"/>
    <circle cx="550" cy="420" r="3"/>
    <circle cx="700" cy="420" r="3"/>
    <circle cx="880" cy="420" r="3"/>
  </g>

  <!-- Subtitle -->
  <text x="600" y="480" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#59676e">Format your WhatsApp messages with bold, italic, fancy text, emojis &amp; more</text>

  <!-- URL -->
  <text x="600" y="560" text-anchor="middle" font-family="monospace" font-size="16" fill="#25d366" letter-spacing="2">whatsformat.com</text>

  <!-- Bottom accent bar -->
  <rect y="626" width="1200" height="4" fill="url(#accent)"/>
</svg>
